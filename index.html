<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Sürprizim Var ❤️</title>
    <meta name="theme-color" content="#030303">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #030303;
            --gold: #d4af37;
            --red: #ff2a6d;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Outfit', sans-serif; color: var(--white); }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }

        .scene {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 2s cubic-bezier(0.2, 0, 0.2, 1);
            text-align: center;
        }

        .scene.active { opacity: 1; visibility: visible; pointer-events: all; }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 5rem 3rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 100px 200px rgba(0,0,0,0.8);
            transform: translateY(40px);
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .scene.active .card { transform: translateY(0); }

        .question {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 4rem;
            font-weight: 400;
            font-style: italic;
        }

        .btn-group {
            position: relative; height: 240px;
            display: flex; flex-direction: column; gap: 2rem;
        }

        .btn {
            padding: 1.5rem 3rem;
            border-radius: 100px;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.2, 0, 0, 1);
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--red), #800020);
            color: white; z-index: 5;
            box-shadow: 0 20px 40px rgba(255, 42, 109, 0.2);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--border);
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1;
        }

        #music-btn {
            position: fixed; bottom: 50px; right: 50px; z-index: 100;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: opacity 2s;
            backdrop-filter: blur(10px); color: var(--gold); font-size: 1.2rem;
        }
        #music-btn.visible { opacity: 1; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center;
            transition: opacity 1.5s;
        }
        .loading-text { color: #444; letter-spacing: 0.5em; font-size: 0.7rem; font-weight: 300; }
    </style>
</head>
<body>

    <div id="loader"><p class="loading-text">PREPARING EXPERIENCE...</p></div>

    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <section id="scene1" class="scene active">
            <h1 class="title">Sana Bir Sürprizim Var ❤️</h1>
        </section>

        <section id="scene2" class="scene">
            <div class="card">
                <h2 class="question">Beni seviyor musun? 😏❤️</h2>
                <div class="btn-group">
                    <button id="btn-yes" class="btn btn-yes">SONSUZA DEK EVET</button>
                    <button id="btn-no" class="btn btn-no">HAYIR</button>
                </div>
            </div>
        </section>

        <section id="scene3" class="scene">
            <h1 class="title" style="font-size: clamp(1.2rem, 5vw, 2.2rem); margin-bottom: 20px; line-height: 1.4; padding: 0 15px;">TABİ SEVECEN BENİM GİBİ ADAMI NERDEN BULACAN G*T</h1>
        </section>
    </div>

    <div id="music-btn">🔇</div>
    <audio id="bg-music" loop preload="auto">
        <source src="cansu.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- LUXURY 3D ENGINE (PARTICLE HEART) ---
        let scene, camera, renderer, particles;
        let clock = new THREE.Clock();
        let targetShape = []; // Heart coordinates
        let currentScene = 1;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Generate Heart Points
            const count = 4000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                // Initial random position (Galaxy)
                pos[i * 3] = (Math.random() - 0.5) * 40;
                pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
                pos[i * 3 + 2] = (Math.random() - 0.5) * 40;

                // Heart Formula Points
                const t = Math.random() * Math.PI * 2;
                const r = Math.random();
                // 3D Heart parametric equations
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                const z = (Math.random() - 0.5) * 8; // Depth
                
                targetShape.push(new THREE.Vector3(x * 0.4, y * 0.4, z));

                // Colors (Gold/Red gradient)
                const mixedColor = new THREE.Color().lerpColors(
                    new THREE.Color(0xff2a6d), 
                    new THREE.Color(0xd4af37), 
                    Math.random()
                );
                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;

                sizes[i] = Math.random() * 2 + 0.5;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            animate();

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1500);
            }, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();
            const positions = particles.geometry.attributes.position.array;

            for (let i = 0; i < targetShape.length; i++) {
                const i3 = i * 3;
                const target = targetShape[i];

                if (currentScene >= 2) {
                    // Morph to Heart
                    positions[i3] += (target.x - positions[i3]) * 0.02;
                    positions[i3 + 1] += (target.y - positions[i3 + 1]) * 0.02;
                    positions[i3 + 2] += (target.z - positions[i3 + 2]) * 0.02;
                } else {
                    // Galaxy movement
                    positions[i3] += Math.sin(delta * 0.5 + i) * 0.01;
                    positions[i3 + 1] += Math.cos(delta * 0.5 + i) * 0.01;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;

            particles.rotation.y += 0.002;
            if (currentScene === 3) {
                particles.rotation.z += 0.01; // Spin fast on celebration
                particles.scale.multiplyScalar(1.002); // Grow
            }

            renderer.render(scene, camera);
        }

        // --- UI LOGIC ---
        window.addEventListener('load', init3D);

        setTimeout(() => {
            document.getElementById('scene1').classList.remove('active');
            setTimeout(() => {
                currentScene = 2;
                document.getElementById('scene2').classList.add('active');
                document.getElementById('music-btn').classList.add('visible');
            }, 1500);
        }, 5000);

        const btnNo = document.getElementById('btn-no');
        const card = document.querySelector('.card');
        function dodge() {
            const cardRect = card.getBoundingClientRect();
            const btnRect = btnNo.getBoundingClientRect();
            
            // Limit movement within the card for better mobile experience
            const padding = 20;
            const maxX = (cardRect.width / 2) - (btnRect.width / 2) - padding;
            const maxY = (cardRect.height / 2) - (btnRect.height / 2) - padding;
            
            const x = (Math.random() - 0.5) * maxX * 2;
            const y = (Math.random() - 0.5) * maxY * 2 - 50;
            
            btnNo.style.transform = `translate(${x}px, ${y}px)`;
            if(navigator.vibrate) navigator.vibrate(30);
        }
        btnNo.addEventListener('mouseover', dodge);
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); });

        document.getElementById('btn-yes').addEventListener('click', () => {
            currentScene = 3;
            document.getElementById('scene2').classList.remove('active');
            
            // Play custom music on YES
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Müzik çalınamadı:", e));
            document.getElementById('music-btn').textContent = '🎵';

            setTimeout(() => {
                document.getElementById('scene3').classList.add('active');
            }, 1000);
            if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
        });

        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        function toggle() {
            if(music.paused) { music.play(); musicBtn.textContent = '🎵'; }
            else { music.pause(); musicBtn.textContent = '🔇'; }
        }
        musicBtn.addEventListener('click', toggle);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
